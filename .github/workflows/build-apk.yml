name: Build & Sign APK — MR Shop Client

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:

      # ============================================================
      # 1. Récupérer le projet
      # ============================================================
      - name: Checkout du dépôt
        uses: actions/checkout@v4


      # ============================================================
      # 2. Installer Java 17
      # ============================================================
      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle


      # ============================================================
      # 3. Installer Flutter
      # ============================================================
      - name: Installer Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true


      # ============================================================
      # 4. Vérifier Flutter
      # ============================================================
      - name: Vérifier Flutter
        run: |
          flutter --version
          flutter doctor -v


      # ============================================================
      # 5. Installer Android SDK 35
      # ============================================================
      - name: Installer Android SDK 35
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-35"
          sdkmanager "build-tools;35.0.0"


      # ============================================================
      # 6. Générer le dossier Android
      #
      # Le projet ne possède pas encore android/.
      # Flutter génère donc le squelette natif.
      # ============================================================
      - name: Générer le projet Android
        run: |
          rm -rf android

          flutter create \
            --platforms=android \
            --org org.triax.mr.shop.app \
            --project-name mr_shop_client \
            .

      # ============================================================
      # 7. Appliquer la configuration Android personnalisée
      # ============================================================
      - name: Appliquer la configuration Android
        run: |
          cp android_overlay/app/build.gradle \
             android/app/build.gradle

          cp android_overlay/app/proguard-rules.pro \
             android/app/proguard-rules.pro

          cp android_overlay/app/src/main/AndroidManifest.xml \
             android/app/src/main/AndroidManifest.xml


      # ============================================================
      # 8. Vérifier le package Android
      # ============================================================
      - name: Vérifier la configuration Android
        run: |
          grep -n "namespace" android/app/build.gradle
          grep -n "applicationId" android/app/build.gradle
          grep -n "compileSdk" android/app/build.gradle


      # ============================================================
      # 9. Restaurer le keystore
      # ============================================================
      - name: Restaurer le keystore de signature
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 non configuré."
            exit 1
          fi

          echo "$KEYSTORE_BASE64" | base64 --decode \
            > android/app/mr-shop-release.jks


      # ============================================================
      # 10. Créer key.properties
      # ============================================================
      - name: Configurer la signature Release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat <<EOF > android/key.properties
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=mr-shop-release.jks
          EOF


      # ============================================================
      # 11. Configurer Google Maps
      # ============================================================
      - name: Injecter la clé Google Maps
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          if [ -n "$MAPS_API_KEY" ]; then
            sed -i \
              "s/YOUR_MAPS_API_KEY_HERE/$MAPS_API_KEY/g" \
              android/app/src/main/AndroidManifest.xml
          else
            echo "MAPS_API_KEY non configurée."
          fi


      # ============================================================
      # 12. Configurer AdMob App ID
      # ============================================================
      - name: Injecter AdMob App ID
        env:
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
        run: |
          if [ -n "$ADMOB_APP_ID" ]; then
            sed -i \
              "s/ca-app-pub-3940256099942544~3347511713/$ADMOB_APP_ID/g" \
              android/app/src/main/AndroidManifest.xml
          else
            echo "ADMOB_APP_ID non configuré."
          fi


      # ============================================================
      # 13. Installer les dépendances Flutter
      # ============================================================
      - name: Installer les dépendances
        run: |
          flutter pub get


      # ============================================================
      # 14. Générer les icônes
      # ============================================================
      - name: Générer les icônes Android
        run: |
          dart run flutter_launcher_icons


      # ============================================================
      # 15. Vérifier les dépendances
      # ============================================================
      - name: Vérifier Geolocator
        run: |
          flutter pub deps | grep -i geolocator || true


      # ============================================================
      # 16. Construire l'APK Release signé
      # ============================================================
      - name: Build APK Release
        env:
          ADMOB_BANNER_ID: ${{ secrets.ADMOB_BANNER_ID }}
          ADMOB_INTERSTITIAL_ID: ${{ secrets.ADMOB_INTERSTITIAL_ID }}
        run: |
          flutter build apk --release \
            --dart-define=ADMOB_BANNER_ID="$ADMOB_BANNER_ID" \
            --dart-define=ADMOB_INTERSTITIAL_ID="$ADMOB_INTERSTITIAL_ID"


      # ============================================================
      # 17. Vérifier l'APK généré
      # ============================================================
      - name: Vérifier APK
        run: |
          ls -lh build/app/outputs/flutter-apk/


      # ============================================================
      # 18. Publier l'APK
      # ============================================================
      - name: Publier l'APK comme artefact
        uses: actions/upload-artifact@v4
        with:
          name: mr-shop-client-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30