name: mr_shop_client
description: MR Shop — Fresh Scent by Elo — application client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Réseau / API
  dio: ^5.4.0

  # État de l'app (simple et suffisant pour ce projet)
  provider: ^6.1.2

  # Stockage sécurisé du token d'auth
  flutter_secure_storage: ^9.0.0

  # Notifications push — DÉSACTIVÉ TEMPORAIREMENT.
  # firebase_core/firebase_messaging enregistrent un composant natif qui
  # s'exécute AVANT même le code Dart au démarrage de l'app. Sans
  # google-services.json (généré par `flutterfire configure`), ce composant
  # plante immédiatement à l'ouverture. Voir README_FLUTTER.md, section
  # "Réactiver les notifications push" pour les remettre une fois configurées.
  # firebase_core: ^3.1.0
  # firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.2.1

  # Paiement GeniusPay (checkout hébergé) + PWA fallback iOS
  webview_flutter: ^4.7.0

  # Carte pour la sélection précise de l'adresse de livraison
  google_maps_flutter: ^2.6.1
  permission_handler: ^11.3.1

  # UI
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  intl: ^0.19.0
  url_launcher: ^6.2.6

  cupertino_icons: ^1.0.6
  google_mobile_ads: ^9.0.0 # v5.x a un bug Gradle connu (build.gradle interne
  # incompatible avec les Gradle récents) — 9.0.0 confirmé fonctionnel.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#FBF7F2"
    theme_color: "#0E3A4C"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
