name: mr_shop_client
description: MR Shop — Fresh Scent by Elo — application client
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Réseau / API
  dio: ^5.4.0

  # État de l'application
  provider: ^6.1.2

  # Stockage sécurisé du token
  flutter_secure_storage: ^9.0.0

  # Notifications push
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.2.1

  # Paiement / WebView
  webview_flutter: ^4.7.0

  # Carte / Géolocalisation
  google_maps_flutter: ^2.6.1
  geolocator: ^14.0.2

  # UI
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  intl: ^0.19.0
  url_launcher: ^6.2.6

  cupertino_icons: ^1.0.6

  # AdMob
  google_mobile_ads: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/